services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator.Dockerfile
    image: hise-orchestrator:dev
    ports: ["8000:8000"]
    environment:
      HISE_REDIS_URL: redis://redis:6379/0
      HISE_CARBON_TRACE: /app/traces/synthetic_solar.csv
      HISE_TICK_SECONDS: "30"
      HISE_LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./traces:/app/traces:ro
      - ./hise:/app/hise:ro

  worker-1:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    image: hise-worker:dev
    environment:
      HISE_WORKER_ID: worker-1
      HISE_WORKER_TIER: cloud
      HISE_ORCHESTRATOR_URL: http://orchestrator:8000
      HISE_REDIS_URL: redis://redis:6379/0
    depends_on:
      orchestrator:
        condition: service_started

  worker-2:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    image: hise-worker:dev
    environment:
      HISE_WORKER_ID: worker-2
      HISE_WORKER_TIER: edge
      HISE_ORCHESTRATOR_URL: http://orchestrator:8000
      HISE_REDIS_URL: redis://redis:6379/0
    depends_on:
      orchestrator:
        condition: service_started
