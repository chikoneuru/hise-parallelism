apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hise-worker
  namespace: hise
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/class: kpa.autoscaling.knative.dev
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "16"
        autoscaling.knative.dev/target: "1"
    spec:
      containerConcurrency: 1
      timeoutSeconds: 3600
      containers:
        - image: hise-worker:dev
          env:
            - {name: HISE_ORCHESTRATOR_URL, value: http://hise-orchestrator.hise:8000}
            - {name: HISE_REDIS_URL, value: redis://hise-redis.hise:6379/0}
          resources:
            limits:
              nvidia.com/gpu: 1
