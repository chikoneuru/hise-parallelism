apiVersion: v1
kind: Namespace
metadata:
  name: hise
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hise-orchestrator
  namespace: hise
spec:
  replicas: 1
  selector:
    matchLabels: {app: hise-orchestrator}
  template:
    metadata:
      labels: {app: hise-orchestrator}
    spec:
      containers:
        - name: orchestrator
          image: hise-orchestrator:dev
          ports: [{containerPort: 8000}]
          env:
            - {name: HISE_REDIS_URL, value: redis://hise-redis:6379/0}
            - {name: HISE_CARBON_TRACE, value: /traces/synthetic_solar.csv}
            - {name: HISE_TICK_SECONDS, value: "30"}
          volumeMounts:
            - {name: traces, mountPath: /traces, readOnly: true}
      volumes:
        - name: traces
          configMap: {name: hise-traces}
---
apiVersion: v1
kind: Service
metadata:
  name: hise-orchestrator
  namespace: hise
spec:
  selector: {app: hise-orchestrator}
  ports:
    - {port: 8000, targetPort: 8000}
